# Project-level Milky Frog configuration.
max_model_calls = 30

# Token budget configuration
context_window = 128000      # Model's context window size
output_reserve = 8000        # Tokens reserved for model output
safety_margin = 1000         # Safety margin below the actual limit

# Shell command timeout (seconds); increase for slow test suites or builds
bash_timeout_seconds = 60

# Checkpoint retention (TTL)
[checkpoint]
retention_days = 30          # Runs older than this are pruned; 0 = disable auto-prune
prune_on_start = true        # Automatically prune stale checkpoints on startup
