# Project-level Milky Frog configuration.
max_model_calls = 30

# Token budget configuration
context_window = 128000      # Model's context window size
output_reserve = 8000        # Tokens reserved for model output
safety_margin = 1000         # Safety margin below the actual limit

# Conversation summarization (compaction): when the transcript exceeds the
# trigger, older rounds are summarized away from the model request (the full
# transcript is still kept in the snapshot).
summarization_enabled = true
# summarization_trigger_tokens = 96000
# summarization_keep_recent_tokens = 32000

# Shell command timeout (seconds); increase for slow test suites or builds
bash_timeout_seconds = 60

# Checkpoint retention (TTL)
[checkpoint]
retention_days = 30          # Runs older than this are pruned; 0 = disable auto-prune
prune_on_start = true        # Automatically prune stale checkpoints on startup

# Additional host env var names forwarded to subprocesses (uppercase identifiers).
# env_allowlist_extra = ["MY_BUILD_VAR", "DEPLOY_TOKEN"]

[sandbox]
kind = "docker"
image = "python:3.12-bookworm"
workspace_mount = "/mnt/workspace"
mask_paths = [".venv", "node_modules"]
